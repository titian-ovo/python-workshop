<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, height=630">
  <title>分享图生成</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #FBBF24 0%, #F59E0B 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .container {
      text-align: center;
      padding: 60px;
    }
    .emoji {
      font-size: 120px;
      display: block;
      margin-bottom: 30px;
    }
    h1 {
      font-size: 56px;
      font-weight: 700;
      color: #1F2937;
      margin-bottom: 20px;
    }
    p {
      font-size: 28px;
      color: #374151;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="emoji">🐍</span>
    <h1>淳の Python 学习工坊</h1>
    <p>30 个核心知识点 · 从零基础到进阶</p>
  </div>
</body>
</html>
